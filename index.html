<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>EVOZX Launch Kit</title><link rel="stylesheet" href="css/style.css"><script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script></head><body><div class="container"><header><h1>EVOZX Launch Kit</h1><p>
